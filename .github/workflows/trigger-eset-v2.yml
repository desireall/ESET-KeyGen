name: Trigger Generator V2

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 1,21 * *' # 每月1号和21号执行

jobs:
  prepare-params:
    runs-on: ubuntu-latest
    outputs:
      account: ${{ steps.set-vars.outputs.account }}
      key: ${{ steps.set-vars.outputs.key }}
      mail: ${{ steps.set-vars.outputs.mail }}
      key_type: ${{ steps.set-vars.outputs.key_type }}
      os: ${{ steps.set-vars.outputs.os }}
      branch: ${{ steps.set-vars.outputs.branch }}
    steps:
      - id: set-vars
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "account=${{ github.event.inputs.account || '0' }}" >> $GITHUB_OUTPUT
            echo "key=${{ github.event.inputs.key || '1' }}" >> $GITHUB_OUTPUT
            echo "mail=${{ github.event.inputs.mail || 'fakemail' }}" >> $GITHUB_OUTPUT
            echo "key_type=${{ github.event.inputs.key_type || '--vpn-codes' }}" >> $GITHUB_OUTPUT
            echo "os=${{ github.event.inputs.os || 'Linux' }}" >> $GITHUB_OUTPUT
            echo "branch=${{ github.event.inputs.branch || 'main' }}" >> $GITHUB_OUTPUT
          else
            echo "account=0" >> $GITHUB_OUTPUT
            echo "key=1" >> $GITHUB_OUTPUT
            echo "mail=fakemail" >> $GITHUB_OUTPUT
            echo "key_type=--vpn-codes" >> $GITHUB_OUTPUT
            echo "os=Linux" >> $GITHUB_OUTPUT
            echo "branch=main" >> $GITHUB_OUTPUT
          fi

  call-eset:
    needs: prepare-params
    uses: ./.github/workflows/eset-v2.yml
    with:
      account: ${{ needs.prepare-params.outputs.account }}
      key: ${{ needs.prepare-params.outputs.key }}
      mail: ${{ needs.prepare-params.outputs.mail }}
      key_type: ${{ needs.prepare-params.outputs.key_type }}
      os: ${{ needs.prepare-params.outputs.os }}
      branch: ${{ needs.prepare-params.outputs.branch }}

  email-summary:
    needs: call-eset
    runs-on: ubuntu-latest
    steps:
      - name: Send email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.example.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "[ESET] Monthly KeyGen Summary"
          to: ${{ github.repository_owner }}
          from: github-actions@example.com
          body: |
            Hello ${{ github.repository_owner }},

            The following is the summary output from your key generation run:

            ${{ needs.call-eset.outputs.summary }}
          content_type: text/plain
